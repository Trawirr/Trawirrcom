{% extends 'base.html' %}

{% block content %}
<h1>Civilzation</h1>
<hr>
<div class="map-div">
    <table class="map-table">
        {% for row in tiles %}
            <tr>
                {% for tile in row %}
                    <td style="background-color: #{{ tile.color }};" data-x="{{ tile.x }}" data-y="{{ tile.y }}" title="({{ tile.x }}, {{ tile.y }}) &#010;{{ tile.height_m }}m"></td>
                {% endfor %}
            </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}

{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <title>Djangame</title>
        <link href='http://fonts.googleapis.com/css?family=Lato:400,700' rel='stylesheet' type='text/css'>
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
    </head>
<body>

<div class="topnav">
    <ul>
        <li><a class="active" href="/">Articles</a></li>
        <li class="dropdown">
            <a href="javascript:void(0)" class="dropbtn">Projects</a>
            <div class="dropdown-content">
                <a href="#">Borsuk-Ulam</a>
                <a href="#">Project 2</a>
                <a href="#">Project 3</a>
            </div>
        </li>
        <li><a href="#">About</a></li>
        {% if user.is_authenticated %}
        <li><a href="{% url 'logout' %}" class="user-info">Logout</a></li>
        {% else %}
        <li><a href="{% url 'login' %}" class="user-info">Log in</a></li>
        {% endif %}
        <li><img alt="prof_img" src="{{ user.author.profile_image.url|default:'/static/upload/profile_images/default_icon.png' }}" width="30" height="30" class="user-image"></li>
        <li><a href="#" class="user-nickname">{{ user.author.nickname|default:"Guest" }}</a></li>
    </ul>
</div>

<div class="center">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
